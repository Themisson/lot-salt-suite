# Schema principal de casos lot-salt-suite.
# Formato: JSON Schema escrito em YAML para validar arquivos de caso.
$schema: "https://json-schema.org/draft/2020-12/schema"
title: lot-salt-suite case
type: object
required:
  - metadata
  - units
  - wellbore
  - casings
  - cements
  - annulars
  - fluids
  - temperature
  - layers
  - rocks
  - lot
  - apb
  - time
  - output
additionalProperties: false
properties:
  metadata:
    type: object
    required: [name, version, mode]
    additionalProperties: false
    properties:
      name: {type: string}
      version: {type: string}
      mode:
        type: string
        enum: [lot, lot-pkn, apb, salt, lot-salt, apb-salt, coupled]
      legacy_source: {type: string}
  simulation:
    type: object
    required: [mode]
    additionalProperties: false
    properties:
      mode:
        type: string
        enum: [lot, lot-pkn, apb, salt, lot-salt, apb-salt, coupled]
  units:
    type: object
    required: [length, pressure, temperature, density, viscosity]
    additionalProperties: false
    properties:
      length: {type: string, enum: [m, ft]}
      pressure: {type: string, enum: [Pa, bar, psi]}
      temperature: {type: string, enum: [degC, K]}
      density: {type: string, enum: [kg_m3, ppg]}
      viscosity: {type: string, enum: [Pa_s, cP]}
  wellbore:
    type: object
    required: [airgap_m, water_depth_m, total_depth_m, shoe_depth_m]
    additionalProperties: false
    properties:
      airgap_m: {type: number}
      water_depth_m: {type: number}
      total_depth_m: {type: number}
      shoe_depth_m: {type: number}
      drill_pipe:
        type: object
        required: [outer_diameter, inner_diameter, depth]
        additionalProperties: false
        properties:
          outer_diameter:
            $ref: "#/$defs/length_quantity"
          inner_diameter:
            $ref: "#/$defs/length_quantity"
          depth:
            $ref: "#/$defs/length_quantity"
  casings:
    type: array
    minItems: 1
    items:
      type: object
      required: [id, top_m, base_m, di_in, de_in, E_Pa, nu]
      additionalProperties: false
      properties:
        id: {type: string}
        top_m: {type: number}
        base_m: {type: number}
        di_in: {type: number}
        de_in: {type: number}
        E_Pa: {type: number}
        nu: {type: number}
        weight_lbf_per_ft: {type: number}
  cements:
    type: array
    items:
      type: object
      required: [id, top_m, base_m, di_in, de_in, E_Pa, nu]
      additionalProperties: false
      properties:
        id: {type: string}
        top_m: {type: number}
        base_m: {type: number}
        di_in: {type: number}
        de_in: {type: number}
        E_Pa: {type: number}
        nu: {type: number}
  annulars:
    type: array
    items:
      type: object
      required: [id, fluid, top_m, base_m]
      additionalProperties: false
      properties:
        id: {type: string}
        fluid: {type: string}
        top_m: {type: number}
        base_m: {type: number}
  fluids:
    type: array
    minItems: 1
    items:
      type: object
      required: [id, density_ppg, compressibility_per_Pa, mode]
      additionalProperties: false
      properties:
        id: {type: string}
        density_ppg: {type: number}
        viscosity_Pa_s: {type: number}
        viscosity_cP: {type: number}
        compressibility_per_Pa: {type: number}
        mode:
          type: string
          enum: [constant, hydrostatic_depth_profile]
        weight_lb_per_gal: {type: number}
        surface_pressure_Pa: {type: number}
      anyOf:
        - required: [viscosity_Pa_s]
        - required: [viscosity_cP]
  temperature:
    type: object
    required: [mode, data]
    additionalProperties: false
    properties:
      mode: {type: string, enum: [profile]}
      data:
        type: array
        items:
          type: object
          required: [depth_m, temp_C]
          additionalProperties: false
          properties:
            depth_m: {type: number}
            temp_C: {type: number}
  layers:
    type: array
    minItems: 1
    items:
      type: object
      required: [id, top_m, base_m, rock]
      additionalProperties: false
      properties:
        id: {type: string}
        top_m: {type: number}
        base_m: {type: number}
        rock: {type: string}
  rocks:
    type: array
    minItems: 1
    items:
      type: object
      required: [id, model, E_Pa, nu, density_kg_m3]
      additionalProperties: false
      properties:
        id: {type: string}
        model: {type: string, enum: [elastic_isotropic, double_mechanism]}
        E_Pa: {type: number}
        nu: {type: number}
        density_kg_m3: {type: number}
        e0_per_h: {type: number}   # FA01: parser converte [1/h] para [1/min].
        sig0_Pa: {type: number}
        T0_degC: {type: number}    # FA02: SESTSAL usa degC; parser tambem calcula K.
        n1: {type: number}
        n2: {type: number}
  lot:
    type: object
    required: [enabled, shoe_depth_m, fracture]
    additionalProperties: false
    properties:
      enabled: {type: boolean}
      shoe_depth_m: {type: number}
      model: {type: string, enum: [pkn, circular, elliptical, penny_shaped]}
      injection:
        type: object
        required: [rate, schedule]
        additionalProperties: false
        properties:
          rate:
            $ref: "#/$defs/rate_quantity"
          schedule:
            type: object
            required: [total_time, dt, accommodation_time]
            additionalProperties: false
            properties:
              total_time:
                $ref: "#/$defs/time_quantity"
              dt:
                $ref: "#/$defs/time_quantity"
              accommodation_time:
                $ref: "#/$defs/time_quantity"
              phases:
                type: array
                minItems: 1
                items:
                  type: object
                  required: [name, duration, rate]
                  additionalProperties: false
                  properties:
                    name:
                      type: string
                      enum: [injection, shutin]
                    duration:
                      $ref: "#/$defs/time_quantity"
                    rate:
                      $ref: "#/$defs/rate_quantity"
      initial_pressure:
        $ref: "#/$defs/pressure_quantity"
      fracture:
        type: object
        required: [geometry]
        additionalProperties: false
        properties:
          geometry:
            type: string
            enum: [circular, elliptical, penny_shaped, pkn]
          fluid_viscosity_cP: {type: number}
          height:
            $ref: "#/$defs/length_quantity"
          initial_width:
            $ref: "#/$defs/length_quantity"
          breakdown:
            type: object
            required: [method, pressure]
            additionalProperties: false
            properties:
              method:
                type: string
                enum: [pressure_threshold, derivative_drop]
              pressure:
                $ref: "#/$defs/pressure_quantity"
          initiation:
            type: object
            required: [type]
            additionalProperties: false
            properties:
              type:
                type: string
                enum: [constant_pressure, sigma_theta_static]
              source:
                type: string
              pressure_source:
                type: string
                enum: [wellbore_pressure_Pa]
              comparison:
                type: string
                enum: [legacy_algebra]
              sigma_theta:
                type: object
                required:
                  - compression_positive
                  - layer_id
                  - influence_depth
                  - mapping_status
                additionalProperties: false
                properties:
                  compression_positive:
                    $ref: "#/$defs/pressure_quantity"
                  layer_id:
                    type: string
                  influence_depth:
                    $ref: "#/$defs/length_quantity"
                  mapping_status:
                    type: string
            allOf:
              - if:
                  properties:
                    type:
                      const: sigma_theta_static
                then:
                  required: [source, pressure_source, comparison, sigma_theta]
          balance:
            type: object
            additionalProperties: false
            properties:
              sink_timing:
                type: string
                enum: [same_step, next_step]
      leakoff:
        type: object
        required: [enabled, model]
        additionalProperties: false
        properties:
          enabled: {type: boolean}
          model:
            type: string
            enum: [none, constant_rate, carter, synthetic_constant]
          coefficient_m_sqrt_s: {type: number, minimum: 0}
          constant_rate_m3_s: {type: number, minimum: 0}
      detection:
        type: object
        required: [method]
        additionalProperties: false
        properties:
          method:
            type: string
            enum: [derivative_drop, pressure_threshold]
      pressure_model:
        type: object
        required: [type]
        additionalProperties: false
        properties:
          type:
            type: string
            enum: [pkn_direct, volumetric_balance]
      volumetric_balance:
        type: object
        additionalProperties: false
        properties:
          compliance:
            type: object
            required: [enabled]
            additionalProperties: false
            properties:
              enabled:
                type: boolean
              model:
                type: string
                enum: [constant_geometric, elastic_annular_simple]
              geometric_compressibility:
                $ref: "#/$defs/compressibility_quantity"
              total_compressibility:
                $ref: "#/$defs/compressibility_quantity"
              inner_boundary:
                type: object
                required: [radius, wall_thickness, young_modulus, poisson_ratio]
                additionalProperties: false
                properties:
                  radius:
                    $ref: "#/$defs/length_quantity"
                  wall_thickness:
                    $ref: "#/$defs/length_quantity"
                  young_modulus:
                    $ref: "#/$defs/pressure_quantity"
                  poisson_ratio:
                    type: number
                    minimum: 0
                    exclusiveMaximum: 0.5
              formation:
                type: object
                required: [radius, young_modulus, poisson_ratio]
                additionalProperties: false
                properties:
                  radius:
                    $ref: "#/$defs/length_quantity"
                  young_modulus:
                    $ref: "#/$defs/pressure_quantity"
                  poisson_ratio:
                    type: number
                    minimum: 0
                    exclusiveMaximum: 0.5
              mechanical_compliance_status:
                type: string
              source:
                type: string
              caveat:
                type: string
            allOf:
              - if:
                  properties:
                    enabled:
                      const: true
                then:
                  required: [model, source]
              - if:
                  properties:
                    model:
                      const: elastic_annular_simple
                then:
                  required: [inner_boundary, formation]
              - not:
                  required: [geometric_compressibility, total_compressibility]
  apb:
    type: object
    required: [enabled, top_packer_m, leakage_enabled, venting_enabled]
    additionalProperties: false
    properties:
      enabled: {type: boolean}
      top_packer_m: {type: number}
      leakage_enabled: {type: boolean}
      venting_enabled: {type: boolean}
  time:
    type: object
    required: [total_h, dt_h, scheme, solver]
    additionalProperties: false
    properties:
      total_h: {type: number}
      dt_h: {type: number}
      scheme: {type: string, enum: [explicit, implicit_adaptive]}
      solver:
        type: object
        required: [tol_pressure_bar, tol_eq, stabilization_h]
        additionalProperties: false
        properties:
          tol_pressure_bar: {type: number}
          tol_eq: {type: number}
          stabilization_h: {type: number}
  output:
    type: object
    required: [directory, every_n_steps, fields, format]
    additionalProperties: false
    properties:
      directory: {type: string}
      every_n_steps: {type: integer}
      fields:
        type: array
        items: {type: string, enum: [pressure, displacement, stress, temperature]}
      format: {type: string, enum: [csv, json]}
$defs:
  rate_quantity:
    type: object
    required: [value, unit]
    additionalProperties: false
    properties:
      value: {type: number}
      unit: {type: string, enum: [m3_s, m3_min, m3_h, bbl_min, bpm]}
  time_quantity:
    type: object
    required: [value, unit]
    additionalProperties: false
    properties:
      value: {type: number}
      unit: {type: string, enum: [s, min, h]}
  length_quantity:
    type: object
    required: [value, unit]
    additionalProperties: false
    properties:
      value: {type: number}
      unit: {type: string, enum: [m, in]}
  pressure_quantity:
    type: object
    required: [value, unit]
    additionalProperties: false
    properties:
      value: {type: number}
      unit: {type: string, enum: [Pa, bar, psi]}
  compressibility_quantity:
    type: object
    required: [value, unit]
    additionalProperties: false
    properties:
      value: {type: number}
      unit: {type: string, enum: ["1/Pa"]}
