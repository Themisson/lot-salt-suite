# docs_status.yaml — Fonte de verdade para status das seções do docs/index.html
#
# Valores permitidos:
#   not_started   — seção não começou
#   planned       — plano existe mas implementação não iniciou
#   in_progress   — em desenvolvimento ativo
#   implemented   — implementado mas não validado
#   validated     — validado com execução real documentada (com data e resultados)
#   risk          — risco conhecido identificado
#
# REGRA: 'validated' somente após execução real com output em docs/12_validation_results.md

