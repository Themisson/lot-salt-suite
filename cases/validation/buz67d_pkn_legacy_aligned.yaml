  # EXTRACTED from legacy: profTeste = 4374.0 m.
  total_depth_m: 4374.0
  # EXTRACTED from legacy: LOT test depth uses profTeste = 4374.0 m.
  shoe_depth_m: 4374.0
  drill_pipe:
    # EXTRACTED from legacy Solids[0]: di = 4.67 in, de = 5.5 in.
    # Solids::getRi_m/getRe_m convert diameters in inches to radii in meters.
    inner_diameter:
      value: 4.67
      unit: in
    outer_diameter:
      value: 5.5
      unit: in
    # EXTRACTED from legacy Solids[0]: bottom = profTeste.
    depth:
      value: 4374.0
      unit: m

casings:
  - id: production_casing
    top_m: 1922.0
    # EXTRACTED from legacy solid[1]: bottom = 4356.0 m.
    base_m: 4356.0
    # EXTRACTED from legacy solid[1]: di = 12.376 in, de = 14.0 in.
    di_in: 12.376
    de_in: 14.0
    E_Pa: 210000000000.0
    nu: 0.30

cements:
  - id: production_cement
    # EXTRACTED from legacy cement phase 3 solid[6].
    top_m: 3879.14
    base_m: 4356.0
    di_in: 14.0
    de_in: 16.0
    E_Pa: 10350000000.0
    nu: 0.21

annulars:
  - id: annulus_a
    fluid: lot_fluid
    top_m: 0.0
    # EXTRACTED from legacy fluid[0] bottom = profTeste.
    base_m: 4374.0

fluids:
  - id: lot_fluid
    mode: constant
    # EXTRACTED from legacy: vfluids[0]->setPFluid(11.5, 8E-4, 6.40E-10).
    density_ppg: 11.5
    # EXTRACTED from legacy: vfluids[0]->setLeakoffProps("pa_min", 3., "pkn").
    viscosity_cP: 3.0
    compressibility_per_Pa: 0.00000000064

temperature:
  mode: profile
  data:
    # EXTRACTED from legacy temperature profile A0/Af at depth 0.0.
    - depth_m: 0.0
      temp_C: 26.66
    # EXTRACTED from legacy active halite T0 = 86 C and migrated surface-to-shoe contract.
    - depth_m: 4374.0
      temp_C: 86.0

layers:
  - id: legacy_aligned_halite_interval
    # EXTRACTED from active legacy HALITA entries: 4356..4360 and 4358..profTeste.
    top_m: 4356.0
    base_m: 4374.0
    rock: legacy_aligned_halite

rocks:
  - id: legacy_aligned_halite
    model: double_mechanism
    # EXTRACTED from legacy active HALITA Rock entries.
    E_Pa: 20400000000.0
    nu: 0.36
    density_kg_m3: 2200.0
    # EXTRACTED from legacy: e0_per_min = 5.22e-10 * 60.
    # Modern CaseData stores e0_per_h; value is kept aligned with the existing
    # migrated contract until parser semantics are revisited.
    e0_per_h: 0.000000522
    sig0_Pa: 9920000.0
    T0_degC: 86.0
    n1: 3.36
    n2: 7.55

lot:
  enabled: true
  # EXTRACTED from legacy: profTeste = 4374.0 m.
  shoe_depth_m: 4374.0
  model: pkn
  initial_pressure:
    # EXTRACTED from legacy audit Phase 10.18B:
    # APB1da uses pw = line_up[lu].pi(idAnnular) + dP(idAnnular).
    # At t = 0 in buz67d_audit_timeseries.csv, dP = 0 and pw_Pa = pi.
    value: 26732215.17314985
    unit: Pa
  injection:
    rate:
      # EXTRACTED from legacy: APB1da(..., idQ=6, Q=0.5), comment "0.5 bpm".
      value: 0.5
      unit: bbl_min
    schedule:
      total_time:
        # EXTRACTED from legacy Phase 10.18B:
        # tend = 12.5 min and t_no_injection = 9.5 min; full cycle = 22 min.
        value: 22.0
        unit: min
      dt:
        # EXTRACTED from legacy: dt = 0.5 min = 30 s.
        value: 0.5
        unit: min
      accommodation_time:
        # Phase 10.18B: t_no_injection is modeled as shut-in after injection,
        # not as pre-injection accommodation.
        value: 0.0
        unit: min
      phases:
        - name: injection
          # EXTRACTED from legacy: tend = 12.5 min with Q = 0.5 bpm.
          duration:
            value: 12.5
            unit: min
          rate:
            value: 0.5
            unit: bbl_min
        - name: shutin
          # EXTRACTED from legacy: t_no_injection = 9.5 min and Vq remains
          # fixed at flowRate(tend), equivalent to Q = 0 for new injection.
          duration:
            value: 9.5
            unit: min
          rate:
            value: 0.0
            unit: bbl_min
  fracture:
    geometry: pkn
    # EXTRACTED from legacy leakoff props viscosity.
    fluid_viscosity_cP: 3.0
    height:
      # NOT_FOUND in legacy; using fallback from migrated case.
      value: 1.0
      unit: m
    initial_width:
      value: 0.0
      unit: m
    breakdown:
      method: pressure_threshold
      pressure:
        # NOT_FOUND in legacy; using fallback placeholder from migrated case.
        value: 1.0
        unit: Pa
  leakoff:
    enabled: true
    # EXTRACTED fracture type is PKN; modern coefficient remains synthetic by
    # fallback because the legacy leakoff coefficient is not exported as YAML data.
    model: synthetic_constant
  detection:
    method: derivative_drop
  pressure_model:
    # Fase 10.17B opt-in diagnostic route. Existing cases remain pkn_direct
    # through the parser default when this block is absent.
    type: volumetric_balance

apb:
  enabled: false
  top_packer_m: 0.0
  leakage_enabled: false
  venting_enabled: false

time:
  # EXTRACTED/DERIVED from legacy Phase 10.18B:
  # 12.5 min injection + 9.5 min shut-in = 22 min = 0.3666666667 h = 1320 s.
  total_h: 0.3666666667
  # EXTRACTED/DERIVED from legacy: 0.5 min = 0.0083333333 h = 30 s.
  dt_h: 0.0083333333
  scheme: explicit
  solver:
    tol_pressure_bar: 0.1
    tol_eq: 0.00000001
    stabilization_h: 0.0

output:
  directory: output/buz67d_pkn_legacy_aligned
  every_n_steps: 1
  fields: [pressure, stress, temperature]
  format: json
