# This file is a new controlled validation case and does not replace
# cases/lot_tese_migrated/buz67d_pkn.yaml.

metadata:
  name: buz67d_pkn_legacy_aligned
  version: "0.1"
  mode: lot-pkn
  legacy_source: legance/LOT_Tese/main/8-BUZ-67D-RJS-VISCO-pkn.cpp
  alignment_source: tests/fixtures/comparison/buz67d_legacy_parameters.json

simulation:
