metadata:
  name: lot_pkn_with_leakoff_validation
  version: "0.1"
  mode: lot-pkn

simulation:
  mode: lot-pkn

units:
  length: m
  pressure: Pa
  temperature: degC
  density: ppg
  viscosity: cP

wellbore:
  airgap_m: 20.0
  water_depth_m: 1800.0
  total_depth_m: 3500.0
  shoe_depth_m: 3300.0

casings:
  - id: production_casing
    top_m: 0.0
    base_m: 3300.0
    di_in: 13.5
    de_in: 16.0
    E_Pa: 210000000000.0
    nu: 0.30

cements:
  - id: production_cement
    top_m: 3000.0
    base_m: 3300.0
    di_in: 16.0
    de_in: 20.0
    E_Pa: 10000000000.0
    nu: 0.25

annulars:
  - id: annulus_a
    fluid: lot_fluid
    top_m: 0.0
    base_m: 3300.0

fluids:
  - id: lot_fluid
    mode: constant
    density_ppg: 12.0
    viscosity_cP: 4.0
    compressibility_per_Pa: 0.00000000050

temperature:
  mode: profile
  data:
    - depth_m: 0.0
      temp_C: 25.0
    - depth_m: 3300.0
      temp_C: 92.0

layers:
  - id: salt_interval
    top_m: 3000.0
    base_m: 3500.0
    rock: halite_elastic

rocks:
  - id: halite_elastic
    model: elastic_isotropic
    E_Pa: 20400000000.0
    nu: 0.36
    density_kg_m3: 2160.0

lot:
  enabled: true
  shoe_depth_m: 3300.0
  model: pkn
  injection:
    rate:
      value: 0.25
      unit: bbl_min
    schedule:
      total_time:
        value: 15.0
        unit: min
      dt:
        value: 0.5
        unit: min
      accommodation_time:
        value: 2.0
        unit: min
  fracture:
    geometry: pkn
    fluid_viscosity_cP: 4.0
    height:
      value: 25.0
      unit: m
    initial_width:
      value: 0.0
      unit: m
    breakdown:
      method: pressure_threshold
      pressure:
        value: 520.0
        unit: bar
  leakoff:
    enabled: true
    model: synthetic_constant
    coefficient_m_sqrt_s: 0.000001
  detection:
    method: derivative_drop

apb:
  enabled: false
  top_packer_m: 0.0
  leakage_enabled: false
  venting_enabled: false

time:
  total_h: 0.25
  dt_h: 0.0083333333
  scheme: explicit
  solver:
    tol_pressure_bar: 1.0
    tol_eq: 0.00000001
    stabilization_h: 0.0333333333

output:
  directory: output/lot_pkn_with_leakoff
  every_n_steps: 1
  fields: [pressure, stress, temperature]
  format: json
