# Phase 10.20C diagnostic case.
# Uses opt-in mechanical annular/wellbore compliance.
# This is not the default LOT/PKN runtime.
# This is not a full APB/salt coupled mechanics model.
# This file is a new controlled validation case and does not replace
# cases/lot_tese_migrated/buz67d_pkn.yaml or previous BUZ67D validation cases.

