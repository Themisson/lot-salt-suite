matrix_id: buz67d_modern_refined_cgeom_sensitivity_v2
schema_version: 2
description: >
  Stage 11 parametric matrix v2 for BUZ-67D modern-refined C_geom sensitivity.
  Diagnostic only; not automatic calibration and not legacy-equivalence mode.
mode: lot-pkn
base_case: cases/validation/sensitivity/buz67d_modern_refined_sens_baseline.yaml
baseline_scenario: cgeom_100_next_step
materialization:
  output_subdir: materialized_cases
  filename_template: "{scenario_id}.yaml"
scenarios:
