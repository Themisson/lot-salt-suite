    overrides:
      lot.volumetric_balance.compliance.geometric_compressibility.value: 0.000000013928975203957504
      lot.fracture.balance.sink_timing: next_step
    metadata:
      cgeom_factor: 0.75
      sink_timing: next_step
      interpretation: diagnostic_sensitivity
  - id: cgeom_100_next_step
    overrides:
      lot.volumetric_balance.compliance.geometric_compressibility.value: 0.000000018571966938610005
      lot.fracture.balance.sink_timing: next_step
    metadata:
      cgeom_factor: 1.0
      sink_timing: next_step
      interpretation: diagnostic_baseline
  - id: cgeom_125_next_step
    overrides:
      lot.volumetric_balance.compliance.geometric_compressibility.value: 0.000000023214958673262507
      lot.fracture.balance.sink_timing: next_step
    metadata:
      cgeom_factor: 1.25
      sink_timing: next_step
      interpretation: diagnostic_sensitivity
  - id: cgeom_100_same_step
    overrides:
      lot.volumetric_balance.compliance.geometric_compressibility.value: 0.000000018571966938610005
      lot.fracture.balance.sink_timing: same_step
