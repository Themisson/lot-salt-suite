# Phase 10.25B diagnostic case.
# Uses refined sigmaTheta series extracted from LOT_Tese criterion trace.
# Diagnostic only; not SaltWallStressDiagnostics runtime.
# Builds on the Phase 10.24B diagnostic route while replacing the sparse
# three-point sigma_theta_time_series with the refined 10.25A legacy criterion trace.
# This file is opt-in validation data and does not replace migrated BUZ67D cases.

