name: modelo_D
# TCC caso D: taquidrita, k0=1.2, lama 16 ppg (caso mais severo)

geometry:
  well_radius_m: 0.155575
  outer_radius_factor: 321.5

depths:
  water_depth_m: 1600
  burial_m: 4100
  salt_above_m: 25

lithology:
  primary: taquidrita

fluid:
  weight_lb_per_gal: 16.0

stress:
  k0: 1.2
  overburden_grad_Pa_per_m: 21000

thermal:
  mode: profile
  seabed_temp_C: 4.0
  grad_C_per_m: 0.01442

element:
  type: axisym_1d_L3

mesh:
  n_elements_radial: 50
  ratio: 500
  n_elements_axial: 1

creep:
  elastic_only: false
  secondary: true

time:
  total_h: 360
  scheme: explicit
  steps:
    - until_h: 0.0001
      dt_h: 1.0e-7
    - until_h: 0.001
      dt_h: 1.0e-6
    - until_h: 0.01
      dt_h: 5.0e-6
    - until_h: 0.1
      dt_h: 5.0e-5
    - until_h: 1.0
      dt_h: 5.0e-4
    - until_h: 10.0
      dt_h: 5.0e-3
    - until_h: 50.0
      dt_h: 1.0e-2
    - until_h: 150.0
      dt_h: 5.0e-2
    - until_h: 360.0
      dt_h: 1.0e-1

output:
  every_n_steps: 1000
  fields: [displacement, stress]
  series: [wall_closure_pct, closure_rate]
